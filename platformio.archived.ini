; Archived build environments. These are retained for reference but are not
; part of the active project or CI. The supported build is SBC_NodeMCU32S in
; platformio.ini.
;
; To build an archived target explicitly:
; pio run --project-conf platformio.archived.ini -e a1sMini
; pio run --project-conf platformio.archived.ini -e AiO-DAC

[platformio]
boards_dir = hardware/boards

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board_build.partitions = huge_app.csv
framework = arduino
extra_scripts =
	pre:version.py
build_flags =
	-D PIOENV="\"$PIOENV\""
lib_deps =
	https://github.com/pschatzmann/ESP32-A2DP.git @~1.8.9
	https://github.com/pschatzmann/arduino-audio-tools.git @~1.2.2
	https://github.com/pschatzmann/arduino-audio-driver.git#v0.2.2
monitor_filters = esp32_exception_decoder
monitor_speed = 115200

[env:a1sMini]
board = audioKit
build_type = debug
board_build.partitions = min_spiffs.csv
build_flags =
	${env.build_flags}
	-D BOARD_HAS_PSRAM
	-D AUDIOKIT
	-D UART1_RX=19
	-D UART1_TX=22
	-D LED_BUILTIN=18
	-D INVERT_LED_LOGIC
	-D CORE_DEBUG_LEVEL=3
	-D A2DP_SINK_NAME="\"A1S MiniPod\""
lib_deps =
	${env.lib_deps}

[env:AiO-DAC]
board = AiODAC_8MB
build_flags =
	${env.build_flags}
	-D CORE_DEBUG_LEVEL=3
	-D A2DP_SINK_NAME="\"AiO MiniPod\""
	-D UART1_RX=19
	-D UART1_TX=21
	-D INVERT_LED_LOGIC
	-D LED_BUILTIN=18
lib_deps =
	${env.lib_deps}
lib_ignore = audio-driver

; Historical special-purpose configurations from the original project:
;
; BluCobalt: ESP32Dev, 57600 baud iPod serial and custom task timings.
; audioKit_topHat: AudioKit with optional SD updater/logger variants.
; SBC_ESP32DevKitC: AZ-Delivery DevKit V4 variant.
