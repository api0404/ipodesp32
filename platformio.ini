[platformio]
boards_dir = hardware/boards

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board_build.partitions = huge_app.csv
framework = arduino
extra_scripts =
	pre:version.py
build_flags =
	-D PIOENV="\"$PIOENV\""
	; -D STACK_HIGH_WATERMARK_LOG
lib_deps =
	https://github.com/pschatzmann/ESP32-A2DP.git @~1.8.9
	https://github.com/pschatzmann/arduino-audio-tools.git @~1.2.2
	; v0.3.0 reorganized the public driver and board headers; stay on the
	; newest release compatible with the AudioTools 1.2.x integration.
	https://github.com/pschatzmann/arduino-audio-driver.git#v0.2.2
monitor_filters = esp32_exception_decoder
monitor_speed = 115200

[env:SBC_NodeMCU32S]
build_type = debug
build_flags =
	${env.build_flags}
	-D CORE_DEBUG_LEVEL=3
	-D UART1_RX=16
	-D UART1_TX=17
	-D ENABLE_ACTIVE_DCD
	-D DCD_CTRL_PIN=5
	; Define DISABLE_ACTIVE_DCD to override the default active-DCD support.
	; -D DISABLE_ACTIVE_DCD
	; -D INVERT_LED_LOGIC
board = nodemcu-32s
lib_deps =
	${env.lib_deps}
lib_ignore = audio-driver
